<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Link Example</title>
</head>
<body>
    <h1>Clickable Image Example</h1>

    <!-- Image wrapped inside an anchor tag -->
    <a href="https://www.ading24ph.website" target="_blank">
        <img src="https://wwww.ading24ph.website/telescope.jpg" 
             alt="Example Link" 
             style="border: 2px solid #000; border-radius: 8px;">
    </a>

    <p>Click the image above to visit Example.com.</p>
</body>
</html>
